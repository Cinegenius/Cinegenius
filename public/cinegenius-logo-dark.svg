<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100" fill="none">
  <!-- Dark background with padding -->
  <rect width="420" height="100" rx="16" fill="#0A0A0A"/>
  <!-- Icon: lime green rounded square -->
  <rect x="14" y="14" width="72" height="72" rx="14" fill="#C2F135"/>
  <!-- Play triangle centered in icon -->
  <polygon points="40,32 40,68 68,50" fill="#0A0A0A"/>
  <!-- Wordmark -->
  <text x="104" y="65"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    letter-spacing="-1.5">
    <tspan fill="#FFFFFF">Cine</tspan><tspan fill="#C2F135">Genius</tspan>
  </text>
</svg>
